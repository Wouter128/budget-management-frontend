<h2 mat-dialog-title>Delete {{ data.subject }}</h2>
<mat-dialog-content>
  Would you like to delete {{ data.subject }} with name '{{ data.name }}'?
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close (click)="cancel()">No</button>
  <button matButton mat-dialog-close cdkFocusInitial (click)="confirm()">Ok</button>
</mat-dialog-actions>

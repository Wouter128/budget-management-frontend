<app-title [title]="'app.transaction.title' | translate"
           [subtitle]="'app.transaction.subtitle' | translate"/>

<button matButton="filled" routerLink="/create-transaction">{{ 'app.button.create' | translate }}</button>

<table mat-table
       [dataSource]="transactions" multiTemplateDataRows
       class="mat-elevation-z8">
  @for (column of columnsToDisplay; track column) {
    <ng-container matColumnDef="{{column}}">
      <th mat-header-cell *matHeaderCellDef>{{ 'app.transaction.' + column | translate }}</th>
      @if (column === 'amount') {
        <td mat-cell class="align-right"
            *matCellDef="let element">{{ element.amount.amount | number:'1.2-2' }} {{ element.amount.currency }}
        </td>
      } @else {
        <td mat-cell *matCellDef="let element">{{ element[column] }}</td>
      }
    </ng-container>
  }
  <ng-container matColumnDef="expand">
    <th mat-header-cell *matHeaderCellDef aria-label="row actions">&nbsp;</th>
    <td mat-cell *matCellDef="let element">
      <button
        matIconButton
        aria-label="expand row"
        (click)="toggle(element); $event.stopPropagation()"
        class="toggle-button"
        [class.toggle-button-expanded]="isExpanded(element)">
        <mat-icon>keyboard_arrow_down</mat-icon>
      </button>
    </td>
  </ng-container>

  <!-- Expanded Content Column - The detail row is made up of this one column that spans across all columns -->
  <ng-container matColumnDef="expandedDetail">
    <td mat-cell *matCellDef="let element" [attr.colspan]="columnsToDisplayWithExpand.length">
      <div class="element-detail-wrapper"
           [class.element-detail-wrapper-expanded]="isExpanded(element)">
        <div class="element-detail">
          <div class="element-description">
            {{ element.description }}
          </div>
        </div>
      </div>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnsToDisplayWithExpand"></tr>
  <tr mat-row *matRowDef="let element; columns: columnsToDisplayWithExpand;"
      class="element-row"
      [class.expanded-row]="isExpanded(element)"
      (click)="toggle(element)">
  </tr>
  <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="detail-row"></tr>
</table>

<app-title [title]="'app.dashboard.title' | translate" [subtitle]="'app.dashboard.subtitle' | translate"/>

@if (isAuthenticated) {
  <p>Hello {{ username }}</p>
}

<button matButton="filled" type="button" (click)="changeLang('en')">{{ 'app.language.en' | translate }}</button>
<button matButton="filled" type="button" (click)="changeLang('nl')">{{ 'app.language.nl' | translate }}</button>

<app-title [title]="'Budget Period'" [subtitle]="'Here you can add a new Budget Period or view your current Budget Period.'" />

<button matButton="filled">New Budget Period</button>

<p>Year: {{budgetPeriod?.year}}</p>

<p>Currency: {{budgetPeriod?.plannedAmount?.currency}}</p>

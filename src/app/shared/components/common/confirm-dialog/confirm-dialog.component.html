<h2 mat-dialog-title>{{ 'app.confirm-dialog.delete.category.title' | translate }}</h2>
<mat-dialog-content>
  {{ 'app.confirm-dialog.delete.category.message' | translate }} '{{ data.name }}'?
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close (click)="cancel()">{{ 'app.button.cancel' | translate }}</button>
  <button matButton mat-dialog-close (click)="confirm()">{{ 'app.button.confirm' | translate }}</button>
</mat-dialog-actions>
